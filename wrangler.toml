name = "rendro"
main = "src/worker.ts"
compatibility_date = "2025-07-06"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[r2_buckets]]
binding = "DOCS"
bucket_name = "rendro-docs"

[[routes]]
pattern = "rendro.app"
custom_domain = true

[vars]
NODE_ENV = "production"
BASE_URL = "https://rendro.app"
