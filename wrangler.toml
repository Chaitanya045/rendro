name = "rendro"
main = "src/worker.ts"
compatibility_date = "2025-07-06"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[vars]
NODE_ENV = "production"
BASE_URL = "https://rendro.app"
# ── Dev environment (deployed from `development` branch) ──
[env.development]
name = "rendro-dev"

[env.development.vars]
NODE_ENV = "production"
BASE_URL = "https://dev.rendro.app"
