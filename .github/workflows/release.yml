name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: rendro-linux-x64
          - os: macos-latest
            target: rendro-darwin-arm64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build
        run: bun run scripts/build-cli.mjs

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: bin/rendro-*
          generate_release_notes: true
